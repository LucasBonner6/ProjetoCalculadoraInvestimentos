<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculadora de Investimentos</title>
  </head>
  <body class="h-[100dvh] grid grid-cols-3 grid-rows-2">
    <aside
      class="row-span-2 bg-emerald-300 flex flex-col justify-between py-5 px-2"
    >
      <h1 class="text-2xl font-bold px-6 py-2">Calculadora de Investimentos</h1>
      <form id="investment-form" class="w-full">
        <div class="flex w-full flex-col px-6 my-2">
          <label for="starting-amount" class="font-bold text-gray-700"
            >Investimentos adicionais</label
          >
          <div class="flex">
            <input
              value="R$"
              type="text"
              disabled
              class="w-1/6 text-center rounded-l-lg bg-emerald-400"
            />
            <input
              type="text"
              id="starting-amount"
              name="starting-amount"
              class="bg-white w-5/6 rounded-r-lg px-2"
              placeholder="0.00"
              required
            />
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="additional-contribution" class="font-bold text-gray-700"
            >Aportes adicionais</label
          >
          <div class="flex">
            <input
              value="R$"
              type="text"
              disabled
              class="w-1/6 text-center rounded-l-lg bg-emerald-400"
            />
            <input
              type="text"
              class="bg-white w-5/6 rounded-r-lg px-2"
              placeholder="0.00"
              name="additional-contribution"
              id="additional-contribution"
            />
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="time-amount" class="font-bold text-gray-700">Prazo</label>
          <div class="flex">
            <input
              type="text"
              id="time-amount"
              name="time-amount"
              class="bg-white w-2/3 rounded-l-lg px-2"
              placeholder="0"
              required
            />

            <select
              id="time-amount-period"
              name="time-amount-period"
              class="bg-white w-1/3 rounded-r-lg text-center border-l-1 border-emerald-600 hover:bg-emerald-950 hover:text-slate-200"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="return-rate" class="font-bold text-gray-700"
            >Rentabilidade</label
          >
          <div class="flex">
            <input
              value="%"
              type="text"
              disabled
              class="w-1/6 text-center rounded-l-lg bg-emerald-400"
            />
            <input
              type="text"
              id="return-rate"
              name="return-rate"
              class="bg-white w-1/2 px-2"
              placeholder="0"
              required
            />
            <select
              id="evaluation-period"
              name="evaluation-period"
              class="bg-white w-1/3 rounded-r-lg text-center border-l-1 border-emerald-600 hover:bg-emerald-950 hover:text-slate-200"
            >
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="tax-rate" class="font-bold text-gray-700"
            >Impostos sobre lucro</label
          >
          <div class="flex">
            <input
              value="%"
              type="text"
              disabled
              class="w-1/6 text-center rounded-l-lg bg-emerald-400"
            />
            <input
              type="text"
              id="tax-rate"
              name="tax-rate"
              class="bg-white w-5/6 rounded-r-lg px-2"
              placeholder="0"
              required
            />
          </div>
        </div>
      </form>
      <div class="flex h-12 px-6 my-8 gap-2">
        <button
          id="calculate-results"
          form="investment-form"
          class="cursor-pointer w-1/2 rounded-lg bg-emerald-950 text-slate-200 hover:bg-emerald-800"
          type="submit"
        >
          Calcular
        </button>
        <button class="cursor-pointer w-1/2 rounded-lg hover:bg-emerald-500">
          Limpar
        </button>
      </div>
    </aside>
    <main>
      <p>Resultados</p>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
